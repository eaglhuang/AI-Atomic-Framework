name: Adopter sentinel

on:
  pull_request:
    paths:
      - 'packages/cli/**'
      - 'packages/create-atm/**'
      - 'scripts/adopter-sentinel.ts'
      - 'docs/TELEMETRY.md'
      - 'docs/DEPRECATIONS.md'
      - '.github/workflows/adopter-sentinel.yml'
  push:
    branches:
      - main
    paths:
      - 'packages/cli/**'
      - 'packages/create-atm/**'
      - 'scripts/adopter-sentinel.ts'
      - 'docs/TELEMETRY.md'
      - 'docs/DEPRECATIONS.md'
      - '.github/workflows/adopter-sentinel.yml'
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sentinel:
    name: Validate common adopter hosts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run adopter sentinel
        run: node --experimental-strip-types scripts/adopter-sentinel.ts --mode validate

      - name: Open sentinel failure issue
        if: failure() && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Adopter sentinel failed on ${new Date().toISOString().slice(0, 10)}`,
              body: `The adopter sentinel workflow failed. Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['adopter-sentinel', 'regression']
            });
