name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ATM Doctor
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            node atm.mjs doctor --ci-profile dependency-pr --json
          else
            node atm.mjs doctor --json
          fi

      - name: ATM Task Audit
        run: node atm.mjs tasks audit --json

      - name: ATM Framework Development Claim
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}"...HEAD)"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git diff --name-only "${{ github.event.before }}"...HEAD)"
          else
            changed_files="$(git diff --name-only HEAD 2>/dev/null || true)"
          fi
          if [ -n "$changed_files" ]; then
            changed_csv="$(printf '%s\n' "$changed_files" | paste -sd, -)"
            node atm.mjs framework-mode claim --actor "ci-${GITHUB_RUN_ID}" --files "$changed_csv" --reason "CI preflight framework-development claim" --json
          else
            echo "No changed files to claim."
          fi

      - name: ATM Framework Development Gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}"...HEAD)"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git diff --name-only "${{ github.event.before }}"...HEAD)"
          else
            changed_files="$(git diff --name-only HEAD 2>/dev/null || true)"
          fi
          if [ -n "$changed_files" ]; then
            changed_csv="$(printf '%s\n' "$changed_files" | paste -sd, -)"
            node atm.mjs guard framework-development --files "$changed_csv" --json
          else
            node atm.mjs guard framework-development --json
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Validate Standard
        run: npm run validate:standard

      - name: ATM Framework Development Release
        if: always()
        shell: bash
        run: node atm.mjs framework-mode release --actor "ci-${GITHUB_RUN_ID}" --json || true
