name: Dependency scan

on:
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'packages/**/package.json'
      - '.github/dependabot.yml'
      - '.github/workflows/dependency-scan.yml'
      - 'SECURITY.md'
      - 'docs/SECURITY.md'
      - 'scripts/validate-security-policy.ts'
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'packages/**/package.json'
      - '.github/dependabot.yml'
      - '.github/workflows/dependency-scan.yml'
      - 'SECURITY.md'
      - 'docs/SECURITY.md'
      - 'scripts/validate-security-policy.ts'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-scan:
    name: Block high and critical production dependency findings
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate security policy contract
        run: node --experimental-strip-types scripts/validate-security-policy.ts --mode validate

      - name: npm audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Setup Go for OSV Scanner
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install OSV Scanner
        run: go install github.com/google/osv-scanner/v2/cmd/osv-scanner@latest

      - name: OSV scan lockfile
        shell: bash
        run: |
          osv-scanner --lockfile=package-lock.json --format=json > osv-results.json || true
          node <<'NODE'
          const fs = require('fs');
          const blockingSeverities = new Set(['HIGH', 'CRITICAL']);
          const payload = JSON.parse(fs.readFileSync('osv-results.json', 'utf8'));
          const findings = [];

          function visit(value, packageName = 'unknown') {
            if (!value || typeof value !== 'object') return;
            if (value.package?.name) packageName = value.package.name;
            if (Array.isArray(value.vulnerabilities)) {
              for (const vulnerability of value.vulnerabilities) {
                const labels = collectSeverityLabels(vulnerability);
                const blocking = labels.some((label) => blockingSeverities.has(label));
                if (blocking) {
                  findings.push({
                    packageName,
                    id: vulnerability.id || vulnerability.aliases?.[0] || 'unknown',
                    severities: labels
                  });
                }
              }
            }
            for (const child of Object.values(value)) {
              if (Array.isArray(child)) child.forEach((entry) => visit(entry, packageName));
              else visit(child, packageName);
            }
          }

          function collectSeverityLabels(vulnerability) {
            const labels = new Set();
            const raw = [
              vulnerability.database_specific?.severity,
              vulnerability.ecosystem_specific?.severity,
              vulnerability.severity,
              vulnerability.severityText
            ];
            for (const entry of raw.flat()) {
              if (!entry) continue;
              if (typeof entry === 'string') labels.add(entry.toUpperCase());
              if (typeof entry === 'object') {
                if (entry.type) labels.add(String(entry.type).toUpperCase());
                if (entry.score) labels.add(String(entry.score).toUpperCase());
              }
            }
            return [...labels];
          }

          visit(payload);
          if (findings.length > 0) {
            console.error('OSV blocking HIGH/CRITICAL findings:');
            for (const finding of findings) {
              console.error(`- ${finding.packageName}: ${finding.id} (${finding.severities.join(', ')})`);
            }
            process.exit(1);
          }
          console.log('OSV scan found no HIGH/CRITICAL blocking findings.');
          NODE
