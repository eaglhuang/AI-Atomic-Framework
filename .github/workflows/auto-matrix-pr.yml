name: Auto compatibility matrix PR

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version to preview, for example 0.1.0'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  matrix-pr:
    name: Generate compatibility matrix PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Generate matrix diff
        id: matrix
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.release_version }}"
          fi
          mkdir -p .github/auto-matrix-pr
          node --experimental-strip-types scripts/generate-matrix-pr.ts --release-version "$version" --matrix compatibility-matrix.json --write --diff-out .github/auto-matrix-pr/compatibility-matrix.diff.json --github-output "$GITHUB_OUTPUT"

      - name: Open matrix review PR
        if: ${{ steps.matrix.outputs.has_changes == 'true' }}
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/compatibility-matrix-${{ steps.matrix.outputs.release_version }}
          commit-message: "chore(release): refresh compatibility matrix for ${{ steps.matrix.outputs.release_version }}"
          title: ${{ steps.matrix.outputs.pr_title }}
          body: ${{ steps.matrix.outputs.pr_body }}
          labels: release, compatibility-matrix
