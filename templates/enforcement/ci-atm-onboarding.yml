name: atm-onboarding-enforcement

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  atm-onboarding:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify ATM doctor
        run: node atm.mjs doctor --json

      - name: Audit ATM task closure integrity
        run: node atm.mjs tasks audit --json

      - name: Verify framework-development gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            changed_files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}"...HEAD)"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git diff --name-only "${{ github.event.before }}"...HEAD)"
          else
            changed_files="$(git diff --name-only HEAD 2>/dev/null || true)"
          fi
          if [ -n "$changed_files" ]; then
            changed_csv="$(printf '%s\n' "$changed_files" | paste -sd, -)"
            node atm.mjs guard framework-development --files "$changed_csv" --json
          else
            node atm.mjs guard framework-development --json
          fi

      - name: Verify ATMChart freshness
        run: node atm.mjs atm-chart verify --json

      - name: Verify installed agent packs are fresh
        shell: bash
        run: |
          shopt -s nullglob
          for manifest in .atm/agent-pack/*.manifest.json; do
            pack_id="$(basename "$manifest" .manifest.json)"
            node atm.mjs agent-pack verify-fresh --id "$pack_id" --json
          done

      - name: Verify installed integrations
        shell: bash
        run: |
          shopt -s nullglob
          for manifest in .atm/integrations/*.manifest.json; do
            adapter_id="$(basename "$manifest" .manifest.json)"
            node atm.mjs integration verify "$adapter_id" --json
          done
